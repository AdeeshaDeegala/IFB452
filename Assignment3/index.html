<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certproff - Academic Credential Verification</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
            color: #1f2937;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        .result {
            background: #eef2ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .status-active {
            color: green;
            font-weight: bold;
        }

        .status-revoked {
            color: red;
            font-weight: bold;
        }

    </style>
</head>
<body>

<header>
    <h1>Certproff</h1>
    <p>Blockchain Academic Credential Verification System</p>
</header>

<div class="container">

    <!-- INSTITUTION -->

    <div class="card">
        <h2>Institution Management (Admin Only)</h2>

        <input type="text" id="institutionAddress" placeholder="Institution Wallet Address">

        <button onclick="approveInstitutionUI()">
            Approve Institution
        </button>

        <button onclick="removeInstitutionUI()">
            Remove Institution
        </button>

        <button onclick="checkInstitutionStatus()">
            Check Approval Status
        </button>

        <div id="institutionResult"></div>
    </div>

    <!-- ISSUE CERTIFICATE -->

    <div class="card">
        <h2>Issue Certificate</h2>

        <input type="text" id="credentialID" placeholder="Credential ID">

        <input type="text" id="qualificationTitle" placeholder="Qualification Title">

        <input type="text" id="institutionName" placeholder="Issuing Institution">

        <input type="text" id="graduateAddress" placeholder="Graduate Wallet Address">

        <button onclick="issueCertificate()">
            Issue Certificate
        </button>
    </div>

    <!-- UPDATE STATUS -->

    <div class="card">
        <h2>Update Credential Status</h2>

        <input type="text" id="updateCredentialID" placeholder="Credential ID">

        <select id="statusSelect">
            <option value="Active">Active</option>
            <option value="Revoked">Revoked</option>
            <option value="Corrected">Corrected</option>
            <option value="Replaced">Replaced</option>
        </select>

        <button onclick="updateStatus()">
            Update Status
        </button>
    </div>

    <!-- VERIFY CREDENTIAL -->

    <div class="card">
        <h2>Verify Credential</h2>

        <input type="text" id="verifyCredentialID" placeholder="Enter Credential ID">

        <button onclick="verifyCredential()">
            Verify Credential
        </button>

        <div id="verificationResult"></div>
    </div>

    <div class="card">
        <h2>Credential Token (NFT Minting)</h2>

        <input type="text" id="mintCredentialID" placeholder="Credential ID">

        <button onclick="mintCredentialToken()">
            Mint Credential Token
        </button>

        <button onclick="viewTokens()">
            View My Tokens
        </button>

        <div id="tokenResult"></div>
    </div>

    <div> 
        <button onclick="connectWallet()">
        Connect MetaMask
        </button>
        <p id="walletAddress"></p>
    </div>
</div>

    // =====================================================
    // CONNECT WALLET
    // =====================================================

    async function connectWallet() {

    try {

        if (!window.ethereum) {
            alert("MetaMask not installed");
            return;
        }

        provider =
            new ethers.providers.Web3Provider(
                window.ethereum
            );

        await provider.send(
            "eth_requestAccounts",
            []
        );

        signer = provider.getSigner();

        currentAccount =
            await signer.getAddress();

        console.log(
            "Connected wallet:",
            currentAccount
        );

        // =========================================
        // INITIALISE CONTRACTS
        // =========================================

        console.log("Creating Institution Contract...");

        institutionContract =
            new ethers.Contract(
                institutionContractAddress,
                institutionABI,
                signer
            );

        console.log("Institution OK");

        console.log("Creating Registry Contract...");

        registryContract =
            new ethers.Contract(
                registryContractAddress,
                registryABI,
                signer
            );

        console.log("Registry OK");

        console.log("Creating Verification Contract...");

        verificationContract =
            new ethers.Contract(
                verificationContractAddress,
                verificationABI,
                signer
            );

        console.log("Verification OK");

        credentialTokenContract =
            new ethers.Contract(
                credentialTokenContractAddress,
                credentialTokenABI,
                signer
            );

        console.log("Credential Token OK");

        alert(
            "Wallet Connected:\n" +
            currentAccount
        );

    } catch(error) {

        console.error(
            "CONNECT ERROR:",
            error
        );

        alert(
            error.message
        );
    }
}

    // =====================================================
    // VIEW TOKENS
    // =====================================================

    async function viewTokens() {

    try {

        let output = "";

        for (let i = 1; i <= 20; i++) {

            try {

                const token =
                    await credentialTokenContract.tokens(i);

                if (token.tokenID.toNumber() === 0) continue;

                output += `
                    <div class="result">
                        <strong>Token ID:</strong> ${token.tokenID}<br>
                        <strong>Credential:</strong> ${token.credentialID}<br>
                        <strong>Owner:</strong> ${token.owner}
                    </div>
                    <br>
                `;

            } catch (e) {
                break;
            }
        }

        document.getElementById("tokenResult").innerHTML =
            output || "No tokens found";

    } catch (error) {

        console.error(error);
        alert(error.message);
    }
}

    // =====================================================
    // MINT CREDENTIAL
    // =====================================================    

    async function mintCredentialToken() {

    try {

        const credentialID =
            document.getElementById("mintCredentialID").value;

        if (!credentialID) {
            alert("Enter credential ID");
            return;
        }

        const tx =
            await credentialTokenContract.mintCredential(
                credentialID
            );

        alert("Transaction sent: " + tx.hash);

        await tx.wait();

        alert("Credential Token Minted");

    } catch (error) {

        console.error(error);
        alert(error.reason || error.message);
    }
}

    async function approveInstitutionUI() {

    try {

        const addr =
            document.getElementById("institutionAddress").value;

        if (!addr) {
            alert("Enter institution address");
            return;
        }

        const tx =
            await institutionContract.approveInstitution(addr);

        alert("Transaction sent: " + tx.hash);

        await tx.wait();

        alert("Institution Approved");

    } catch (error) {

        console.error(error);
        alert(error.reason || error.message);
    }
}

    // =====================================================

            return;
        }

        const tx =
            await institutionContract.removeInstitution(addr);

        await tx.wait();

        console.error(error);
        alert(error.reason || error.message);
    }
}

    // =====================================================

    async function checkInstitutionStatus() {

    try {

        const addr =
            document.getElementById("institutionAddress").value;

        if (!addr) {
            alert("Enter institution address");
            return;
        }

        const isApproved =
            await institutionContract.isApproved(addr);

        document.getElementById("institutionResult").innerHTML =
            `
            <div class="result">
                <strong>Institution:</strong> ${addr}<br>
                <strong>Status:</strong>
                <span style="color:${isApproved ? 'green' : 'red'}">
                    ${isApproved ? "APPROVED" : "NOT APPROVED"}
                </span>
            </div>
            `;

    } catch (error) {

        console.error(error);
        alert(error.message);
    }
}

    // =====================================================

    async function issueCertificate() {
        console.log("Registry Contract:", registryContract);
        
        try {

            // Read values from form
            const credentialID =
                document.getElementById(
                    "credentialID"
                ).value;

            const qualificationTitle =
                document.getElementById(
                    "qualificationTitle"
                ).value;

            const institutionName =
                document.getElementById(
                    "institutionName"
                ).value;

            const graduateAddress =
                document.getElementById(
                    "graduateAddress"
                ).value;

            // Validation
            if (
                !credentialID ||
                !qualificationTitle ||
                !institutionName ||
                !graduateAddress
            ) {
                alert("Please fill all fields");
                return;
            }

            // Send transaction
            const tx =
                await registryContract.issueCertificate(
                    credentialID,
                    qualificationTitle,
                    institutionName,
                    graduateAddress
                );

            alert(
                "Transaction submitted...\n" +
                tx.hash
            );

            await tx.wait();

            alert(
                "Certificate Issued Successfully"
            );

        } catch(error) {

            console.error(error);

            alert(
                error.reason ||
                error.message
            );
        }
    }

            const statusText =

            // ENUM mapping
            const statusMap = {
                "Active": 0,
                "Revoked": 1,
                "Corrected": 2,
                "Replaced": 3
            };

            const statusValue =
                statusMap[statusText];

            const tx =
                await registryContract.updateStatus(
                    credentialID,
                    statusValue
                );

            alert(
                "Transaction submitted...\n" +
                tx.hash
            );

            await tx.wait();

            alert(
                "Credential Status Updated"
            );

        } catch(error) {

            console.error(error);

            alert(
                error.reason ||
                error.message
            );
        }
    }

            // Convert UNIX timestamp

                new Date(
                    result.issueDate.toNumber() * 1000
                );

            // Display results

                "verificationResult"
            ).innerHTML = `

                <div class="result">

                    <h3>Verification Result</h3>

                    <p>
                        <strong>Credential ID:</strong>
                        ${result.credentialID}
                    </p>

                    <p>
                        <strong>Qualification:</strong>
                        ${result.qualificationTitle}
                    </p>

                    <p>
                        <strong>Institution:</strong>
                        ${result.issuingInstitution}
                    </p>

                    <p>
                        <strong>Issue Date:</strong>
                        ${issueDate.toLocaleDateString()}
                    </p>

                    <p>
                        <strong>Status:</strong>
                        ${statuses[result.status]}
                    </p>

                    <p>
                        <strong>Valid:</strong>
                        ${result.valid ? "Yes" : "No"}
                    </p>

                </div>
            `;

        } catch(error) {

            console.error(error);

            alert(
                error.reason ||
                error.message
            );
        }
    }

</script>

</body>
</html>

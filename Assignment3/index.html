<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certproff - Academic Credential Verification</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
            color: #1f2937;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        .result {
            background: #eef2ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .status-active {
            color: green;
            font-weight: bold;
        }

        .status-revoked {
            color: red;
            font-weight: bold;
        }

    </style>
</head>
<body>

<header>
    <h1>Certproff</h1>
    <p>Blockchain Academic Credential Verification System</p>
</header>

<div class="container">

    <!-- ISSUE CERTIFICATE -->

    <div class="card">
        <h2>Issue Certificate</h2>

        <input type="text" id="credentialID" placeholder="Credential ID">

        <input type="text" id="qualificationTitle" placeholder="Qualification Title">

        <input type="text" id="institutionName" placeholder="Issuing Institution">

        <input type="text" id="graduateAddress" placeholder="Graduate Wallet Address">

        <button onclick="issueCertificate()">
            Issue Certificate
        </button>
    </div>

    <!-- UPDATE STATUS -->

    <div class="card">
        <h2>Update Credential Status</h2>

        <input type="text" id="updateCredentialID" placeholder="Credential ID">

        <select id="statusSelect">
            <option value="Active">Active</option>
            <option value="Revoked">Revoked</option>
            <option value="Corrected">Corrected</option>
            <option value="Replaced">Replaced</option>
        </select>

        <button onclick="updateStatus()">
            Update Status
        </button>
    </div>

    <!-- VERIFY CREDENTIAL -->

    <div class="card">
        <h2>Verify Credential</h2>

        <input type="text" id="verifyCredentialID" placeholder="Enter Credential ID">

        <button onclick="verifyCredential()">
            Verify Credential
        </button>

        <div id="verificationResult"></div>
    </div>

    <div> 
        <button onclick="connectWallet()">
        Connect MetaMask
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>

    // =====================================================
    // ETHERS + METAMASK SETUP
    // =====================================================

    const provider =
        new ethers.providers.Web3Provider(window.ethereum);

    let signer;

    // =====================================================
    // CONTRACT ADDRESSES
    // =====================================================

    const institutionContractAddress =
        "0xd9145CCE52D386f254917e481eB44e9943F39138";

    const registryContractAddress =
        "0xf8e81D47203A594245E36C48e151709F0C19fBe8";

    const credentialTokenContractAddress =
        "0x652c9ACcC53e765e1d96e2455E618dAaB79bA595";

    const verificationContractAddress =
        "0x417Bf7C9dc415FEEb693B6FE313d1186C692600F";

    // =====================================================
    // INSTITUTION ABI
    // =====================================================

    const institutionABI = [

        {
            "inputs": [],
            "stateMutability": "nonpayable",
            "type": "constructor"
        },

        {
            "anonymous": false,
            "inputs": [
                {
                    "indexed": false,
                    "internalType": "address",
                    "name": "institution",
                    "type": "address"
                }
            ],
            "name": "InstitutionApproved",
            "type": "event"
        },

        {
            "anonymous": false,
            "inputs": [
                {
                    "indexed": false,
                    "internalType": "address",
                    "name": "institution",
                    "type": "address"
                }
            ],
            "name": "InstitutionRemoved",
            "type": "event"
        },

        {
            "inputs": [],
            "name": "admin",
            "outputs": [
                {
                    "internalType": "address",
                    "name": "",
                    "type": "address"
                }
            ],
            "stateMutability": "view",
            "type": "function"
        },

        {
            "inputs": [
                {
                    "internalType": "address",
                    "name": "institution",
                    "type": "address"
                }
            ],
            "name": "approveInstitution",
            "outputs": [],
            "stateMutability": "nonpayable",
            "type": "function"
        },

        {
            "inputs": [
                {
                    "internalType": "address",
                    "name": "",
                    "type": "address"
                }
            ],
            "name": "approvedInstitutions",
            "outputs": [
                {
                    "internalType": "bool",
                    "name": "",
                    "type": "bool"
                }
            ],
            "stateMutability": "view",
            "type": "function"
        },

        {
            "inputs": [
                {
                    "internalType": "address",
                    "name": "institution",
                    "type": "address"
                }
            ],
            "name": "isApproved",
            "outputs": [
                {
                    "internalType": "bool",
                    "name": "",
                    "type": "bool"
                }
            ],
            "stateMutability": "view",
            "type": "function"
        },

        {
            "inputs": [
                {
                    "internalType": "address",
                    "name": "institution",
                    "type": "address"
                }
            ],
            "name": "removeInstitution",
            "outputs": [],
            "stateMutability": "nonpayable",
            "type": "function"
        }
    ];

    // =====================================================
    // REGISTRY ABI
    // =====================================================

    const registryABI = [

        {
            "inputs": [
                {
                    "internalType": "address",
                    "name": "institutionAddress",
                    "type": "address"
                }
            ],
            "stateMutability": "nonpayable",
            "type": "constructor"
        },

        {
            "anonymous": false,
            "inputs": [
                {
                    "indexed": false,
                    "internalType": "string",
                    "name": "credentialID",
                    "type": "string"
                },
                {
                    "indexed": false,
                    "internalType": "string",
                    "name": "qualificationTitle",
                    "type": "string"
                },
                {
                    "indexed": false,
                    "internalType": "string",
                    "name": "issuingInstitution",
                    "type": "string"
                },
                {
                    "indexed": false,
                    "internalType": "address",
                    "name": "graduate",
                    "type": "address"
                }
            ],
            "name": "CertificateIssued",
            "type": "event"
        },

        {
            "anonymous": false,
            "inputs": [
                {
                    "indexed": false,
                    "internalType": "string",
                    "name": "credentialID",
                    "type": "string"
                },
                {
                    "indexed": false,
                    "internalType": "enum CertificateStatus",
                    "name": "status",
                    "type": "uint8"
                }
            ],
            "name": "StatusUpdated",
            "type": "event"
        },

        {
            "inputs": [
                {
                    "internalType": "string",
                    "name": "_credentialID",
                    "type": "string"
                }
            ],
            "name": "getCredential",
            "outputs": [
                {
                    "internalType": "string",
                    "name": "",
                    "type": "string"
                },
                {
                    "internalType": "string",
                    "name": "",
                    "type": "string"
                },
                {
                    "internalType": "string",
                    "name": "",
                    "type": "string"
                },
                {
                    "internalType": "uint256",
                    "name": "",
                    "type": "uint256"
                },
                {
                    "internalType": "enum CertificateStatus",
                    "name": "",
                    "type": "uint8"
                },
                {
                    "internalType": "address",
                    "name": "",
                    "type": "address"
                }
            ],
            "stateMutability": "view",
            "type": "function"
        },

        {
            "inputs": [],
            "name": "institutionContract",
            "outputs": [
                {
                    "internalType": "contract Institution",
                    "name": "",
                    "type": "address"
                }
            ],
            "stateMutability": "view",
            "type": "function"
        },

        {
            "inputs": [
                {
                    "internalType": "string",
                    "name": "_credentialID",
                    "type": "string"
                },
                {
                    "internalType": "string",
                    "name": "_qualificationTitle",
                    "type": "string"
                },
                {
                    "internalType": "string",
                    "name": "_issuingInstitution",
                    "type": "string"
                },
                {
                    "internalType": "address",
                    "name": "_graduateAddress",
                    "type": "address"
                }
            ],
            "name": "issueCertificate",
            "outputs": [],
            "stateMutability": "nonpayable",
            "type": "function"
        },

        {
            "inputs": [
                {
                    "internalType": "string",
                    "name": "_credentialID",
                    "type": "string"
                },
                {
                    "internalType": "enum CertificateStatus",
                    "name": "_status",
                    "type": "uint8"
                }
            ],
            "name": "updateStatus",
            "outputs": [],
            "stateMutability": "nonpayable",
            "type": "function"
        }
    ];

    // =====================================================
    // VERIFICATION ABI
    // =====================================================

    const verificationABI = [

        {
            "inputs": [
                {
                    "internalType": "address",
                    "name": "registryAddress",
                    "type": "address"
                }
            ],
            "stateMutability": "nonpayable",
            "type": "constructor"
        },

        {
            "inputs": [],
            "name": "registry",
            "outputs": [
                {
                    "internalType": "contract Registry",
                    "name": "",
                    "type": "address"
                }
            ],
            "stateMutability": "view",
            "type": "function"
        },

        {
            "inputs": [
                {
                    "internalType": "string",
                    "name": "_credentialID",
                    "type": "string"
                }
            ],
            "name": "verifyCredential",
            "outputs": [
                {
                    "components": [
                        {
                            "internalType": "string",
                            "name": "credentialID",
                            "type": "string"
                        },
                        {
                            "internalType": "string",
                            "name": "qualificationTitle",
                            "type": "string"
                        },
                        {
                            "internalType": "string",
                            "name": "issuingInstitution",
                            "type": "string"
                        },
                        {
                            "internalType": "uint256",
                            "name": "issueDate",
                            "type": "uint256"
                        },
                        {
                            "internalType": "enum CertificateStatus",
                            "name": "status",
                            "type": "uint8"
                        },
                        {
                            "internalType": "bool",
                            "name": "valid",
                            "type": "bool"
                        }
                    ],
                    "internalType": "struct Verification.VerificationResult",
                    "name": "",
                    "type": "tuple"
                }
            ],
            "stateMutability": "view",
            "type": "function"
        }
    ];

    // =====================================================
    // CONTRACT OBJECTS
    // =====================================================

    let institutionContract;
    let registryContract;
    let verificationContract;

    // =====================================================
    // CONNECT WALLET
    // =====================================================

    async function connectWallet() {

        provider.send(
            "eth_requestAccounts",
            []
        ).then(() => {

            provider.listAccounts().then(
                (accounts) => {

                    signer =
                        provider.getSigner(
                            accounts[0]
                        );

                    NameContract =
                        new ethers.Contract(
                            NameContractAddress,
                            NameContractABI,
                            signer
                        );

                    console.log(
                        "Connected:",
                        accounts[0]
                    );

                    alert(
                        "MetaMask Connected"
                    );
                }
            );
        });
    }

    // =====================================================
    // ISSUE CERTIFICATE
    // =====================================================

    async function issueCertificate() {

        try {

            const tx =
                await registryContract.issueCertificate(
                    "CERT-001",
                    "Bachelor of IT",
                    "University of Technology",
                    "0x1234567890123456789012345678901234567890"
                );

            await tx.wait();

            alert("Certificate Issued");

        } catch(error) {

            console.error(error);
        }
    }

    // =====================================================
    // UPDATE STATUS
    // =====================================================

    async function updateCredentialStatus() {

        try {

            /*
                ENUM VALUES

                0 = Active
                1 = Revoked
                2 = Corrected
                3 = Replaced
            */

            const tx =
                await registryContract.updateStatus(
                    "CERT-001",
                    1
                );

            await tx.wait();

            alert("Status Updated");

        } catch(error) {

            console.error(error);
        }
    }

    // =====================================================
    // VERIFY CREDENTIAL
    // =====================================================

    async function verifyCredential() {

        try {

            const result =
                await verificationContract.verifyCredential(
                    "CERT-001"
                );

            const statuses = [
                "Active",
                "Revoked",
                "Corrected",
                "Replaced"
            ];

            console.log("Credential ID:",
                result.credentialID);

            console.log("Qualification:",
                result.qualificationTitle);

            console.log("Institution:",
                result.issuingInstitution);

            console.log("Issue Date:",
                new Date(
                    result.issueDate * 1000
                ));

            console.log("Status:",
                statuses[result.status]);

            console.log("Valid:",
                result.valid);

            alert("Verification Complete");

        } catch(error) {

            console.error(error);
        }
    }

</script>

</body>
</html>
